name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (testes + gate de cobertura)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ride-challenge-backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, testes e gate de cobertura
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify

      - name: Publicar relatorios JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: ride-challenge-backend/**/target/site/jacoco/**
          if-no-files-found: ignore

  frontend:
    name: Frontend (testes + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ride-challenge-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ride-challenge-frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Testes unitarios (headless)
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build de producao
        run: npm run build
