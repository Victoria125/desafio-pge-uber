server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:ride-challenge-jwt-secret-key-32-bytes-minimum-value}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  cloud:
    gateway:
      server:
        webflux:


          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:4200"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true
                max-age: 3600
          discovery:
            locator:
              enabled: true
          routes:
            - id: auth-route
              uri: lb://ACCOUNT-SERVICE
              predicates:
                - Path=/auth/**

            - id: account-route
              uri: lb://ACCOUNT-SERVICE
              predicates:
                - Path=/accounts/**

            - id: ride-route
              uri: lb://RIDE-SERVICE
              predicates:
                - Path=/rides/**



            - id: ride-ws-route
              uri: lb:ws://RIDE-SERVICE
              predicates:
                - Path=/ws,/ws/**
