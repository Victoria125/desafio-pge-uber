<p-toast />
<div class="shell">
  <header class="shell-header">
    <h1 class="shell-title">
      <a routerLink="/" class="shell-title-link">Desafio de Corridas</a>
    </h1>
    <nav class="shell-nav">
      @for (item of visibleNavItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="shell-nav-link"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </header>
  <div class="shell-body">
    @if (account(); as acc) {
      <aside class="shell-sidebar">
        <div class="sidebar-panel">
          <p class="sidebar-name">{{ acc.name }}</p>
          <p class="sidebar-meta">{{ acc.email }}</p>
          <p class="sidebar-meta">{{ typeLabel(acc.type) }}</p>
          <button
            type="button"
            class="sidebar-logout"
            (click)="logout()"
          >
            Sair
          </button>
        </div>
      </aside>
    }
    <main class="shell-main">
      <router-outlet />
    </main>
  </div>
</div>
