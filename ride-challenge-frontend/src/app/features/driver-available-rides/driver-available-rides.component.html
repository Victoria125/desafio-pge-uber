<div class="rides-page">
  <app-page-header title="Corridas disponíveis" [subtitle]="account()?.name ?? null">
    <p-button
      label="Atualizar"
      icon="pi pi-refresh"
      severity="secondary"
      [outlined]="true"
      [loading]="loading()"
      (onClick)="loadRides()"
    />
  </app-page-header>

  <p-table
    [value]="availableRides()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '50rem' }"
    class="p-datatable-sm app-table"
    [rowTrackBy]="trackById"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Corrida</th>
        <th>Origem</th>
        <th>Destino</th>
        <th>Status</th>
        <th>Criada em</th>
        <th style="width: 10rem">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-ride>
      <tr>
        <td class="id-cell">{{ shortId(ride.id) }}</td>
        <td>{{ ride.startAddress }}</td>
        <td>{{ ride.destinationAddress }}</td>
        <td>
          <app-ride-status-tag [status]="ride.status" perspective="driver" />
        </td>
        <td>{{ ride.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <div class="table-actions">
            <p-button
              label="Aceitar"
              size="small"
              icon="pi pi-check"
              [loading]="acceptingRideId() === ride.id"
              [disabled]="acceptingRideId() !== null && acceptingRideId() !== ride.id"
              (onClick)="acceptRide(ride)"
            />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="empty-message">Nenhuma corrida disponível no momento.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
